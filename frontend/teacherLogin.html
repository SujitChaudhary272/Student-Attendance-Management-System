<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">PCCOE</div>
      <span class="brand-name">Attendence<span>Portal</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="teacherRegister.html">Register</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="auth-shell fade-in">
      <div class="auth-card">
        <div class="page-header" style="margin-bottom:1.5rem">
          <h1 class="page-title">Teacher <span class="highlight">Login</span></h1>
          <p class="page-subtitle">Sign in to view your subjects and record attendance securely.</p>
        </div>

        <div id="teacherLoginAlert"></div>

        <form id="teacherLoginForm" onsubmit="loginTeacher(event)">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="teacher@example.com" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="teacherLoginBtn">Login</button>
        </form>

        <div class="auth-footer">
          Need an account? <a href="teacherRegister.html">Register here</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/teacher.js"></script>
</body>
</html>
